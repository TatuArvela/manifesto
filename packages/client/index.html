<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' blob: data:; script-src 'self'; worker-src 'self'; connect-src 'self'; object-src 'none'; manifest-src 'self'" />

         should add `Content-Security-Policy: frame-ancestors 'self'` and
         `X-Frame-Options: SAMEORIGIN` as real HTTP response headers to block
         clickjacking via cross-origin iframes. -->
    <title>Manifesto</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-1024.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-white dark:bg-neutral-900 text-neutral-900 dark:text-neutral-100">
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
